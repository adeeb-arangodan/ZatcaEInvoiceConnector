<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Failed Submission</title>
</head>
<body>
    <h1>Delete Failed Submission</h1>
    <p>Are you sure you want to delete "{{ object }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Confirm Delete</button>
    </form>

    <p><a href="{% url 'organization:failed-submission-list' organization.pk %}">Cancel</a></p>
</body>
</html>
