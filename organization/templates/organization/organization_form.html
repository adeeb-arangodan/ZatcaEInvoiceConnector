<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if object %}Edit{% else %}Add{% endif %} Organization</title>
</head>
<body>
    <h1>{% if object %}Edit{% else %}Add{% endif %} Organization</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>

    <p>
        {% if object %}
            <a href="{% url 'organization:dashboard' object.pk %}">Back to dashboard</a>
        {% else %}
            <a href="{% url 'organization:landing' %}">Back to home</a>
        {% endif %}
    </p>
</body>
</html>
